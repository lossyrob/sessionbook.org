  contents: read
  pull-requests: write
env:
  CLOUD_RUN_REGION: us-central1
  GCP_PROJECT_ID: sessionbook-491003
  GCP_DEPLOY_SERVICE_ACCOUNT: github-action-1188413025@sessionbook-491003.iam.gserviceaccount.com
  STAGING_CLOUD_RUN_SERVICE: sessionbook-web-staging
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run test
      - run: npm run typecheck
      - run: npm run build
      - name: Validate staging runtime secret
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL_STAGING is required for runtime preview deploys." >&2
            exit 1
          fi
      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SESSIONBOOK_491003 }}
      - uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.STAGING_CLOUD_RUN_SERVICE }}
          source: .
          project_id: ${{ env.GCP_PROJECT_ID }}
          region: ${{ env.CLOUD_RUN_REGION }}
          env_vars: |-
            DATABASE_URL=${{ secrets.DATABASE_URL_STAGING }}
          flags: >-
            --allow-unauthenticated
            --concurrency=1
            --build-service-account=${{ env.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SESSIONBOOK_491003 }}
          expires: 7d
          projectId: sessionbook-491003
          target: staging
